services:
  - type: web
    name: agentic-trading-api
    env: python
    region: oregon
    plan: standard
    
    # Build and run from repository root (dashboard lives under dashboard/)
    buildCommand: pip install -r requirements.txt
    
    # Start command
    startCommand: python dashboard/backend/app.py
    
    # Port
    envVars:
      - key: PORT
        value: 8000
      - key: PYTHONUNBUFFERED
        value: true
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: DATABASE_PATH
        value: /data/backtest.db
    
    # Health check
    healthCheckPath: /health
    
    # File storage for SQLite database (persistent)
    disks:
      - name: database
        mountPath: /data
        sizeGB: 1
