services:
  - type: web
    name: agentic-trading-api
    env: python
    region: oregon
    plan: standard
    
    # Build and run from repository root (dashboard lives under dashboard/)
    buildCommand: pip install -r requirements.txt
    
    # Start command (canonical ASGI package target; runs via Render's shell,
    # which expands $PORT). No import-path workarounds needed.
    startCommand: uvicorn dashboard.backend.app:app --host 0.0.0.0 --port $PORT
    
    # Port
    envVars:
      - key: PORT
        value: 8000
      - key: PYTHONUNBUFFERED
        value: true
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: DATABASE_PATH
        value: /data/backtest.db
    
    # Health check
    healthCheckPath: /health
    
    # File storage for SQLite database (persistent)
    disks:
      - name: database
        mountPath: /data
        sizeGB: 1

  # Discord bot — long-running WebSocket process (not an HTTP web service).
  # Render does NOT offer a free plan for workers (see render.com/docs/free).
  # Use plan: starter (~$7/mo) or create manually in the dashboard.
  - type: worker
    name: agentic-trading-discord-bot
    env: python
    region: oregon
    plan: starter

    buildCommand: pip install -r requirements-discord.txt
    startCommand: python -m dashboard.backend.integrations.discord_bot

    envVars:
      - key: PYTHONUNBUFFERED
        value: true
      - key: PYTHON_VERSION
        value: 3.13.5
      # Point at the API web service in this Blueprint (https URL).
      - key: ATL_API_BASE
        fromService:
          name: agentic-trading-api
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      # Set these in the Render dashboard (Secrets) before first deploy:
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: DISCORD_GUILD_ID
        sync: false
      - key: DISCORD_CHANNEL_ID
        sync: false
      # /ask and free-form chat call the LLM inside the worker process:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: COMMONSTACK_API_KEY
        sync: false
      - key: COMMONSTACK_BASE_URL
        sync: false
