<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Link Discord · Agentic Trading Lab</title>
  <link rel="icon" type="image/png" href="/images/atltransparent.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0b0f14;
      --card: #121820;
      --border: #1f2937;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #00d4ff;
      --ok: #22c55e;
      --err: #f87171;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
    }
    h1 { font-size: 1.35rem; margin: 0 0 8px; }
    p { color: var(--muted); line-height: 1.5; margin: 0 0 16px; }
    label { display: block; font-size: 0.85rem; margin-bottom: 6px; color: var(--muted); }
    input {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #0b0f14;
      color: var(--text);
      font: inherit;
    }
    button, .btn {
      display: inline-block;
      width: 100%;
      padding: 11px 14px;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #041018;
      font-weight: 600;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
    }
    button:disabled { opacity: 0.6; cursor: wait; }
    .msg { margin-top: 14px; padding: 10px 12px; border-radius: 8px; font-size: 0.9rem; }
    .msg.ok { background: rgba(34, 197, 94, 0.12); color: var(--ok); }
    .msg.err { background: rgba(248, 113, 113, 0.12); color: var(--err); }
    .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
    .tabs button {
      flex: 1;
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .tabs button.active { background: var(--accent); color: #041018; border-color: var(--accent); }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Link Discord</h1>
    <p id="subtitle">Log in to connect your ATL account with the Discord bot.</p>

    <div id="missingCode" class="hidden">
      <p class="msg err">Missing link code. In Discord DM, say <strong>connect</strong> to get a new link.</p>
      <a class="btn" href="/app">Go to dashboard</a>
    </div>

    <div id="authPanel" class="hidden">
      <div class="tabs">
        <button type="button" id="tabLogin" class="active">Log in</button>
        <button type="button" id="tabSignup">Sign up</button>
      </div>
      <form id="loginForm">
        <label for="loginEmail">Email</label>
        <input id="loginEmail" type="email" autocomplete="email" required />
        <label for="loginPassword">Password</label>
        <input id="loginPassword" type="password" autocomplete="current-password" required />
        <button type="submit">Log in &amp; link Discord</button>
      </form>
      <form id="signupForm" class="hidden">
        <label for="signupName">Display name</label>
        <input id="signupName" type="text" autocomplete="name" required />
        <label for="signupEmail">Email</label>
        <input id="signupEmail" type="email" autocomplete="email" required />
        <label for="signupPassword">Password (8+ chars)</label>
        <input id="signupPassword" type="password" autocomplete="new-password" minlength="8" required />
        <button type="submit">Create account &amp; link Discord</button>
      </form>
    </div>

    <div id="linkingPanel" class="hidden">
      <p>Linking your account…</p>
    </div>

    <div id="donePanel" class="hidden">
      <p class="msg ok" id="doneMsg">Discord linked successfully.</p>
      <a class="btn" href="/app">Open dashboard</a>
      <p style="margin-top:16px;font-size:0.9rem;">Return to Discord DM and say <strong>show my agents</strong>.</p>
    </div>

    <div id="status" class="msg hidden"></div>
  </div>

  <script>
    (function () {
      var AUTH_TOKEN_KEY = 'auth-token';
      var AUTH_USER_KEY = 'auth-user';
      var host = window.location.hostname;
      var API_BASE = (host === 'localhost' || host === '127.0.0.1')
        ? window.location.origin
        : 'https://agentictrading.onrender.com';

      var params = new URLSearchParams(window.location.search);
      var code = (params.get('code') || '').trim();

      var missingCode = document.getElementById('missingCode');
      var authPanel = document.getElementById('authPanel');
      var linkingPanel = document.getElementById('linkingPanel');
      var donePanel = document.getElementById('donePanel');
      var statusEl = document.getElementById('status');

      function showStatus(text, isError) {
        statusEl.textContent = text;
        statusEl.className = 'msg ' + (isError ? 'err' : 'ok');
        statusEl.classList.remove('hidden');
      }

      function saveAuth(data) {
        localStorage.setItem(AUTH_TOKEN_KEY, data.token);
        localStorage.setItem(AUTH_USER_KEY, JSON.stringify(data.user));
      }

      function api(path, options) {
        options = options || {};
        var headers = { 'Content-Type': 'application/json' };
        var token = localStorage.getItem(AUTH_TOKEN_KEY);
        if (token) headers.Authorization = 'Bearer ' + token;
        return fetch(API_BASE + path, {
          method: options.method || 'GET',
          headers: headers,
          body: options.body ? JSON.stringify(options.body) : undefined,
        }).then(function (res) {
          return res.json().then(function (data) {
            if (!res.ok) {
              var msg = data.detail || data.error || ('HTTP ' + res.status);
              throw new Error(typeof msg === 'string' ? msg : JSON.stringify(msg));
            }
            return data;
          });
        });
      }

      function confirmLink() {
        authPanel.classList.add('hidden');
        linkingPanel.classList.remove('hidden');
        statusEl.classList.add('hidden');
        return api('/api/discord/confirm-link', { method: 'POST', body: { code: code } })
          .then(function () {
            linkingPanel.classList.add('hidden');
            donePanel.classList.remove('hidden');
            document.getElementById('subtitle').textContent = 'All set.';
          })
          .catch(function (err) {
            linkingPanel.classList.add('hidden');
            authPanel.classList.remove('hidden');
            showStatus(err.message || 'Link failed.', true);
          });
      }

      if (!code) {
        missingCode.classList.remove('hidden');
        document.getElementById('subtitle').classList.add('hidden');
        return;
      }

      var token = localStorage.getItem(AUTH_TOKEN_KEY);
      if (token) {
        api('/api/auth/me').then(function () {
          return confirmLink();
        }).catch(function () {
          localStorage.removeItem(AUTH_TOKEN_KEY);
          localStorage.removeItem(AUTH_USER_KEY);
          authPanel.classList.remove('hidden');
        });
      } else {
        authPanel.classList.remove('hidden');
      }

      document.getElementById('tabLogin').onclick = function () {
        document.getElementById('tabLogin').classList.add('active');
        document.getElementById('tabSignup').classList.remove('active');
        document.getElementById('loginForm').classList.remove('hidden');
        document.getElementById('signupForm').classList.add('hidden');
      };
      document.getElementById('tabSignup').onclick = function () {
        document.getElementById('tabSignup').classList.add('active');
        document.getElementById('tabLogin').classList.remove('active');
        document.getElementById('signupForm').classList.remove('hidden');
        document.getElementById('loginForm').classList.add('hidden');
      };

      document.getElementById('loginForm').onsubmit = function (e) {
        e.preventDefault();
        api('/api/auth/login', {
          method: 'POST',
          body: {
            email: document.getElementById('loginEmail').value,
            password: document.getElementById('loginPassword').value,
          },
        }).then(function (data) {
          saveAuth(data);
          return confirmLink();
        }).catch(function (err) {
          showStatus(err.message, true);
        });
      };

      document.getElementById('signupForm').onsubmit = function (e) {
        e.preventDefault();
        api('/api/auth/signup', {
          method: 'POST',
          body: {
            email: document.getElementById('signupEmail').value,
            display_name: document.getElementById('signupName').value,
            password: document.getElementById('signupPassword').value,
          },
        }).then(function (data) {
          saveAuth(data);
          return confirmLink();
        }).catch(function (err) {
          showStatus(err.message, true);
        });
      };
    })();
  </script>
</body>
</html>
