<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <meta property="og:type" content="website" />

    <meta name="twitter:title" content="Agentic Trading Lab" />
    <meta name="twitter:description" content="Talk to agents. Test trading ideas. Connect your financial agent and review performance in the lab." />
    <link rel="icon" type="image/png" href="/images/atltransparent.png" />
    <link rel="apple-touch-icon" href="/images/atltransparent.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script type="module" crossorigin src="/assets/index-BB7gl2m6.js?v=4"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-BQNECKqk.css?v=4">
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        var APP_URL = '/app';
        var DISCORD_URL = 'https://discord.gg/9HnQ6XDG98';

        function extraSectionsHtml() {
          return ''
            + '<section id="discord-prompt" class="py-24 bg-muted/20 border-y border-border">'
            + '  <div class="container mx-auto px-6">'
            + '    <div class="grid lg:grid-cols-2 gap-16 items-center">'
            + '      <div>'
            + '        <h2 class="text-3xl md:text-4xl font-bold mb-4">Prompt Your Agent Through Discord</h2>'
            + '        <p class="text-muted-foreground mb-6 text-lg leading-relaxed">Talk to your trading agent where your team already collaborates. Send strategy ideas, ask for backtests, review decisions, and iterate in plain language — no dashboard required.</p>'
            + '        <ul class="space-y-3 mb-8 text-sm text-muted-foreground">'
            + '          <li>Describe setups, risk rules, and entry/exit logic conversationally</li>'
            + '          <li>Your agent translates prompts into executable trading logic</li>'
            + '          <li>Stay in sync with your lab community on Discord</li>'
            + '        </ul>'
            + '        <a href="' + DISCORD_URL + '" target="_blank" rel="noopener noreferrer" class="inline-flex items-center justify-center rounded-md text-sm font-semibold h-11 px-6 bg-[#5865F2] hover:bg-[#5865F2]/90 text-white">Join Discord Community</a>'
            + '      </div>'
            + '      <div class="bg-card border border-card-border rounded-xl shadow-2xl overflow-hidden">'
            + '        <div class="h-10 bg-muted/50 border-b border-border flex items-center px-4 text-xs font-mono text-muted-foreground">#agent-trading-lab</div>'
            + '        <div class="p-5 space-y-4 text-sm">'
            + '          <div class="bg-muted p-3 rounded-lg text-foreground">Backtest a momentum strategy on NVDA. Buy when RSI crosses above 55, sell below 45.</div>'
            + '          <div class="bg-card border border-card-border p-3 rounded-lg text-muted-foreground">Running backtest on NVDA (1H, YTD)… <span class="text-positive font-semibold">Done:</span> +14.2% return, Sharpe 1.84</div>'
            + '        </div>'
            + '      </div>'
            + '    </div>'
            + '  </div>'
            + '</section>'
            + '<section id="paper-trading" class="py-24 relative">'
            + '  <div class="container mx-auto px-6">'
            + '    <div class="grid lg:grid-cols-2 gap-16 items-center">'
            + '      <div class="order-2 lg:order-1 bg-card border border-card-border rounded-xl shadow-2xl p-6 md:p-8">'
            + '        <div class="grid grid-cols-2 gap-4 mb-6">'
            + '          <div class="p-4 border border-border rounded-lg bg-background"><div class="text-xs text-muted-foreground mb-1">Portfolio Value</div><div class="text-2xl font-bold font-mono">$128,742</div></div>'
            + '          <div class="p-4 border border-border rounded-lg bg-background"><div class="text-xs text-muted-foreground mb-1">Day P/L</div><div class="text-2xl font-bold font-mono text-positive">+$2,847</div></div>'
            + '          <div class="p-4 border border-border rounded-lg bg-background"><div class="text-xs text-muted-foreground mb-1">Open Positions</div><div class="text-2xl font-bold font-mono">6</div></div>'
            + '          <div class="p-4 border border-border rounded-lg bg-background"><div class="text-xs text-muted-foreground mb-1">Agent Status</div><div class="text-2xl font-bold font-mono text-positive">Live</div></div>'
            + '        </div>'
            + '        <p class="text-xs text-muted-foreground font-mono">Paper session active · decisions streaming to dashboard</p>'
            + '      </div>'
            + '      <div class="order-1 lg:order-2">'
            + '        <h2 class="text-3xl md:text-4xl font-bold mb-4">Deploy to Live Paper Trading</h2>'
            + '        <p class="text-muted-foreground mb-6 text-lg leading-relaxed">Once your agent passes backtests, deploy it to a live paper trading environment. Monitor portfolio value, positions, and every decision in real time — without risking capital.</p>'
            + '        <ul class="space-y-3 mb-8 text-sm text-muted-foreground">'
            + '          <li>One-click deploy from backtest to paper trading</li>'
            + '          <li>Track equity curve, trades, and agent decisions live</li>'
            + '          <li>Validate strategies in realistic market conditions safely</li>'
            + '        </ul>'
            + '        <a href="' + APP_URL + '" class="inline-flex items-center justify-center rounded-md text-sm font-semibold h-11 px-6 bg-primary text-primary-foreground hover:bg-primary/90">Open Dashboard</a>'
            + '      </div>'
            + '    </div>'
            + '  </div>'
            + '</section>';
        }

        function insertExtraSections() {
          if (document.getElementById('discord-prompt')) return;
          var anchor = document.getElementById('backtesting');
          if (!anchor) return;
          anchor.insertAdjacentHTML('afterend', extraSectionsHtml());
        }

        function patchLanding() {
          document.querySelectorAll('main a, main button, footer a, footer button').forEach(function (el) {
            var label = (el.textContent || '').trim();
            if (label === 'Connect Discord' || label === 'Join the Discord') el.textContent = 'Join Discord Community';
          });

          document.querySelectorAll('#community .flex.items-center').forEach(function (row) {
            var text = (row.textContent || '').trim();
            if (!text || /Prize Pool|badges for top/i.test(text)) row.remove();
          });

          document.querySelectorAll('footer p').forEach(function (p) {
            if (/broker/i.test(p.textContent || '')) {
              p.textContent = 'Start building and backtesting for free.';
            }
          });

          document.querySelectorAll('#community p').forEach(function (p) {
            if (/cash prizes|compute credits|leaderboard glory/i.test(p.textContent || '')) {
              p.textContent = 'Join developers and traders. Deploy your agents in seasonal paper trading competitions and climb the leaderboard.';
            }
          });

          var nav = document.querySelector('nav .container');
          if (nav && nav.lastElementChild && !nav.lastElementChild.dataset.patchedNav) {
            nav.lastElementChild.dataset.patchedNav = '1';
            nav.lastElementChild.className = 'flex items-center gap-4';
            nav.lastElementChild.innerHTML =
              '<a href="' + APP_URL + '" class="inline-flex items-center justify-center rounded-md text-sm font-semibold h-9 px-4 bg-primary text-primary-foreground hover:bg-primary/90 transition-colors">Open Dashboard</a>';
          }

          insertExtraSections();
        }

        document.addEventListener('click', function (event) {
          var target = event.target;
          if (!target || !target.closest) return;

          var button = target.closest('button, a[role="button"], a');
          if (!button) return;

          var label = (button.textContent || '').trim();
          if (label === 'Open Dashboard' || label === 'Get Started' || label === 'Open Playground') {
            if ((button.getAttribute('href') || '') === '/app' || button.tagName === 'BUTTON') {
              event.preventDefault();
              window.location.href = APP_URL;
            }
            return;
          }
          if (label === 'Join Discord Community' || label === 'Connect Discord') {
            event.preventDefault();
            window.open(DISCORD_URL, '_blank', 'noopener,noreferrer');
          }
        });

        var root = document.getElementById('root');
        if (!root) return;
        var observer = new MutationObserver(function () { patchLanding(); });
        observer.observe(root, { childList: true, subtree: true });
        patchLanding();
        setTimeout(patchLanding, 100);
        setTimeout(patchLanding, 500);
      })();
    </script>
  </body>
</html>
