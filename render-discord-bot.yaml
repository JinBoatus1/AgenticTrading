# Standalone Discord bot worker — use when the API is already deployed elsewhere
# (e.g. free-tier web service at agentictrading.onrender.com).
#
# Dashboard → New → Blueprint → connect repo → set Blueprint path to this file.
#
# Render workers have no free plan (minimum Starter ~$7/mo):
# https://render.com/docs/free

services:
  - type: worker
    name: agentic-trading-discord-bot
    env: python
    region: oregon
    plan: starter

    buildCommand: pip install -r requirements-discord.txt
    startCommand: python -m dashboard.backend.integrations.discord_bot

    envVars:
      - key: PYTHONUNBUFFERED
        value: true
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: ATL_API_BASE
        value: https://agentictrading.onrender.com
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: DISCORD_GUILD_ID
        sync: false
      - key: DISCORD_CHANNEL_ID
        sync: false
      - key: DISCORD_BOT_API_SECRET
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: COMMONSTACK_API_KEY
        sync: false
      - key: COMMONSTACK_BASE_URL
        sync: false
