name: Publish agentictrading to PyPI

# Publishes the `agentictrading` package (packaging/agentictrading) to PyPI.
# Triggered by pushing a version tag like `v0.1.1`, or run manually.
#
# Uses PyPI Trusted Publishing (OIDC) -- no API token/secret needed.
# One-time setup on PyPI: see packaging/agentictrading/RELEASING.md

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    working-directory: packaging/agentictrading

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install build tooling
        run: python -m pip install --upgrade build

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          PKG_VERSION="$(grep -E '^__version__' src/agentictrading/__init__.py | sed -E 's/.*"([^"]+)".*/\1/')"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Package version: $PKG_VERSION"
          echo "Tag version:     $TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag ($TAG_VERSION) does not match package __version__ ($PKG_VERSION)."
            exit 1
          fi

      - name: Build sdist and wheel
        run: python -m build

      - name: Check artifacts
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: packaging/agentictrading/dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/agentictrading/
    permissions:
      id-token: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
